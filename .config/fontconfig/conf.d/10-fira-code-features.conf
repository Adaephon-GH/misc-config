<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <match target="font">
    <test name="family" compare="contains">
      <string>Fira Code</string>
    </test>
    <edit name="fontfeatures" mode="append">
      <string>cv06</string>
      <string>cv14</string>
      <string>onum</string>
      <string>ss01</string>
      <string>ss03</string>
      <string>ss04</string>
      <string>ss05</string>
      <string>ss06</string>
      <string>ss08</string>
      <string>ss09</string>
      <string>zero</string>
    </edit>
  </match>
</fontconfig>
